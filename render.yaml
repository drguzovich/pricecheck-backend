services:
  - type: web
    name: pricecheck-backend
    env: node
    plan: free
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: pricecheck-data
      mountPath: /data
      sizeGB: 1
